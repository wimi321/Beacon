name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web-and-dart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build web app
        run: npm run build

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install Dart dependencies
        run: dart pub get

      - name: Dart analyze
        run: dart analyze --fatal-infos

      - name: Run Dart tests
        run: dart test
