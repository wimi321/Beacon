name: Bug report
description: Report a reproducible issue in Beacon
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      placeholder: Android 15 / iOS 18 / Web
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: Which device are you using?
      placeholder: Pixel 8 Pro / iPhone 16 Pro
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1. Open Beacon
        2. Tap a preset
        3. Ask a follow-up question
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Text triage
        - Visual help
        - Session memory
        - Language / i18n
        - Android native runtime
        - iOS native runtime
        - Knowledge retrieval
        - Build / installation
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or attach screenshots if available.
